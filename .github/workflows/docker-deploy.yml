name: Build, Publish & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: [self-hosted, node-b]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/ausagentsmith/rusttorrent
            ${{ vars.DOCKERHUB_USERNAME }}/rusttorrent
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: [self-hosted, node-b]
    needs: build-and-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          set -e
          echo "==> Stopping old containers..."
          docker stop rqbit 2>/dev/null; docker rm rqbit 2>/dev/null || true
          docker compose down 2>/dev/null || true
          echo "==> Deploying container..."
          docker compose up --build -d
          echo "==> Pruning old images..."
          docker image prune -f
          echo "==> Waiting for service..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3030/ > /dev/null 2>&1; then
              echo "==> rtbit is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 60s"
          docker compose logs --tail 50
          exit 1
