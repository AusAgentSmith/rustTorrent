name: Release binaries for OSX

# DISABLED: needs review and fixes before re-enabling auto triggers
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Binstall
        uses: cargo-bins/cargo-binstall@main

      - name: install Tauri
        run: cargo binstall tauri-cli --no-confirm

      - name: npm install (desktop)
        working-directory: desktop
        run: npm install

      - name: npm install (librtbit/webui)
        working-directory: crates/librtbit/webui
        run: npm install

      - name: cargo tauri build
        working-directory: desktop
        run:
          rustup target add aarch64-apple-darwin && rustup target add x86_64-apple-darwin &&
          cargo tauri build --target universal-apple-darwin --ci

      - uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            target/universal-apple-darwin/release/bundle/dmg/rtbit-desktop_*_universal.dmg

      - name: Make a directory for output artifacts
        run: mkdir -p target/artifacts

      - name: Build release OSX universal binary
        run: rustup target install aarch64-apple-darwin &&
          cargo build --profile release-github --target x86_64-apple-darwin &&
          cargo build --profile release-github --target aarch64-apple-darwin &&
          lipo ./target/x86_64-apple-darwin/release-github/rtbit ./target/aarch64-apple-darwin/release-github/rtbit -create -output ./target/artifacts/rtbit-osx-universal

      - uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            target/artifacts/rtbit-osx-universal
