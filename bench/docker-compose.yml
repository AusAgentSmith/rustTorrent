# BitTorrent Client Benchmark: rtbit vs qBittorrent
#
# Usage:  cd bench && ./run.sh
# Or:     cd bench && docker compose up --build
#
# Architecture:
#   tracker        - Minimal Python HTTP tracker
#   seeder x N     - Transmission-daemon instances (realistic, <=10)
#   mock-seeder    - Lightweight async mock peers (100-1000 peers in one container)
#   rtbit          - Client under test (built from project source)
#   qbittorrent    - Client under test (official image)
#   cadvisor       - Container-level CPU/memory/network/disk metrics
#   node-exporter  - Host-level metrics (iowait, etc.)
#   prometheus     - Time-series DB
#   orchestrator   - Python script driving scenarios + collecting results

services:
  # ── Tracker ──────────────────────────────────────────────────────────────
  tracker:
    build: ./tracker
    networks:
      - bench
    restart: unless-stopped

  # ── Real seeders (transmission, for low peer counts <=10) ───────────────
  seeder:
    build: ./seeder
    deploy:
      replicas: ${MAX_SEEDERS:-10}
    volumes:
      - testdata:/data/testdata
      - torrents:/data/torrents
    networks:
      - bench
    depends_on:
      - tracker
    restart: unless-stopped

  # ── Mock seeder (lightweight, for high peer counts 10-1000) ─────────────
  mock-seeder:
    build: ./mock_seeder
    command:
      - python
      - "-u"
      - mock_seeder.py
      - "--peers"
      - "${MOCK_PEERS:-100}"
      - "--base-port"
      - "6900"
      - "--tracker"
      - "http://tracker:6969/announce"
    volumes:
      - testdata:/data/testdata
      - torrents:/data/torrents
    networks:
      - bench
    depends_on:
      - tracker
    restart: unless-stopped

  # ── rtbit (client under test) ──────────────────────────────────────────
  rtbit:
    build:
      context: ..
      dockerfile: Dockerfile
    command:
      - --disable-dht
      - --disable-dht-persistence
      - --disable-upnp-port-forward
      - --disable-lsd
      - --tracker-refresh-interval
      - "5s"
      - --peer-connect-timeout
      - "1s"
      - server
      - start
      - /home/rtbit/downloads
    environment:
      - RTBIT_HTTP_API_LISTEN_ADDR=0.0.0.0:3030
      - RTBIT_LISTEN_PORT=4240
    volumes:
      - downloads-rtbit:/home/rtbit/downloads
      - rtbit-db:/home/rtbit/db
      - rtbit-cache:/home/rtbit/cache
    networks:
      - bench
    depends_on:
      - tracker
    restart: unless-stopped

  # ── qBittorrent (client under test) ────────────────────────────────────
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - WEBUI_PORT=8080
      - DOCKER_MODS=  # intentionally empty
    volumes:
      - downloads-qbt:/downloads
      - qbt-config:/config
    networks:
      - bench
    depends_on:
      - tracker
    restart: unless-stopped

  # ── Metrics: cAdvisor ──────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - bench
    restart: unless-stopped

  # ── Metrics: Node Exporter ─────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.diskstats"
      - "--collector.filesystem"
      - "--collector.meminfo"
      - "--collector.netdev"
    networks:
      - bench
    restart: unless-stopped

  # ── Metrics: Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.3
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=1d"
    networks:
      - bench
    depends_on:
      - cadvisor
      - node-exporter
    restart: unless-stopped

  # ── Orchestrator ───────────────────────────────────────────────────────
  orchestrator:
    build: ./orchestrator
    environment:
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-bench}
      - MAX_SEEDERS=${MAX_SEEDERS:-10}
      - MOCK_PEERS=${MOCK_PEERS:-100}
      - SCENARIOS=${SCENARIOS:-all}
      - QUICK=${QUICK:-0}
    volumes:
      - testdata:/data/testdata
      - torrents:/data/torrents
      - ./results:/results
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bench
    depends_on:
      - tracker
      - seeder
      - mock-seeder
      - rtbit
      - qbittorrent
      - prometheus
      - cadvisor
      - node-exporter

networks:
  bench:
    driver: bridge

volumes:
  testdata:
  torrents:
  downloads-rtbit:
  downloads-qbt:
  qbt-config:
  rtbit-db:
  rtbit-cache:
  prometheus-data:
