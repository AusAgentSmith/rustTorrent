global:
  scrape_interval: 250ms
  evaluation_interval: 1s

scrape_configs:
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "rqbit"
    static_configs:
      - targets: ["rqbit:3030"]
    metrics_path: "/metrics"
