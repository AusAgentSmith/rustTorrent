services:
  rqbit:
    build: .
    container_name: rqbit
    restart: unless-stopped
    ports:
      - "3030:3030"       # HTTP API + Web UI
      - "4240:4240/tcp"   # BitTorrent TCP
      - "4240:4240/udp"   # BitTorrent uTP
    environment:
      RQBIT_UPNP_SERVER_ENABLE: "false"
      RQBIT_HTTP_API_LISTEN_ADDR: "0.0.0.0:3030"
      RQBIT_LISTEN_PORT: "4240"
      RQBIT_FASTRESUME: "true"
      RQBIT_COMPLETED_FOLDER: "/home/rqbit/completed"
    volumes:
      - rqbit-db:/home/rqbit/db
      - rqbit-cache:/home/rqbit/cache
      - ${RQBIT_DOWNLOADS:-/mnt/data3/downloads/rqbit}:/home/rqbit/downloads
      - ${RQBIT_COMPLETED:-/mnt/data3/completed/rqbit}:/home/rqbit/completed

volumes:
  rqbit-db:
  rqbit-cache:
