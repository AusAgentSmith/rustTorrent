# rustTorrent + Indexarr combined stack
#
# Indexarr runs in sync+web mode (no DHT crawling) and syncs from the network.
# rustTorrent proxies search/browse requests to Indexarr.
#
# First run:
#   1. docker compose -f docker-compose.indexarr.yml up -d
#   2. Open http://localhost:3030/web/ — click "Browse Index"
#   3. Complete the Indexarr first-time setup (save recovery key, pick categories)
#
# Environment variables (set in .env or shell):
#   INDEXARR_SYNC_PEERS — JSON array of peer URLs
#   INDEXARR_CONTRIBUTOR_RECOVERY_KEY — restore identity, skip first-boot wizard
#   INDEXARR_TORZNAB_API_KEY — API key for search (auto-generated on first boot if unset)

services:
  # --- PostgreSQL for Indexarr ---
  postgres:
    image: postgres:17-alpine
    container_name: indexarr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: indexarr
      POSTGRES_PASSWORD: indexarr
      POSTGRES_DB: indexarr
    volumes:
      - indexarr-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexarr"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Indexarr (sync + web server only) ---
  indexarr:
    build:
      context: ${INDEXARR_BUILD_CONTEXT:-../Indexarr}
    container_name: indexarr
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      INDEXARR_DB_URL: postgresql+asyncpg://indexarr:indexarr@postgres:5432/indexarr
      INDEXARR_DB_BACKEND: postgresql
      INDEXARR_HOST: "0.0.0.0"
      INDEXARR_PORT: "8080"

      # P2P Sync
      INDEXARR_SYNC_ENABLED: "true"
      INDEXARR_SYNC_PEERS: '${INDEXARR_SYNC_PEERS:-["https://bootstrap.indexarr.net"]}'
      INDEXARR_SYNC_EXPORT_INTERVAL: "300"

      # XMPP peer discovery (optional)
      INDEXARR_XMPP_ENABLED: "${INDEXARR_XMPP_ENABLED:-false}"
      INDEXARR_XMPP_JID: "${INDEXARR_XMPP_JID:-}"
      INDEXARR_XMPP_PASSWORD: "${INDEXARR_XMPP_PASSWORD:-}"
      INDEXARR_XMPP_SERVER: "xmpp.indexarr.net:5222"
      INDEXARR_XMPP_MUC_ROOM: "indexarr-sync@conference.indexarr.net"

      # API key — used by rustTorrent to authenticate search requests
      INDEXARR_TORZNAB_API_KEY: "${INDEXARR_TORZNAB_API_KEY:-}"

      # Optional: restore identity without GUI wizard
      INDEXARR_CONTRIBUTOR_RECOVERY_KEY: "${INDEXARR_CONTRIBUTOR_RECOVERY_KEY:-}"
    ports:
      - "6890:6890"          # P2P sync (libtorrent TCP)
      - "6890:6890/udp"      # P2P sync (libtorrent UDP)
      - "6895:6895/udp"      # Sync peer discovery DHT
    # Do NOT expose 8080 externally — rtbit proxies it
    volumes:
      - indexarr-data:/app/data
    command: ["--workers", "http_server,sync"]

  # --- rustTorrent ---
  rtbit:
    build:
      context: .
    container_name: rtbit
    restart: unless-stopped
    depends_on:
      - indexarr
    ports:
      - "3030:3030"          # HTTP API + Web UI
      - "4240:4240/tcp"      # BitTorrent TCP
      - "4240:4240/udp"      # BitTorrent uTP
    environment:
      RTBIT_UPNP_SERVER_ENABLE: "false"
      RTBIT_HTTP_API_LISTEN_ADDR: "0.0.0.0:3030"
      RTBIT_LISTEN_PORT: "4240"
      RTBIT_FASTRESUME: "true"
      RTBIT_COMPLETED_FOLDER: "/home/rtbit/completed"

      # Indexarr integration
      RTBIT_INDEXARR_ENABLED: "true"
      RTBIT_INDEXARR_URL: "http://indexarr:8080"
      RTBIT_INDEXARR_API_KEY: "${INDEXARR_TORZNAB_API_KEY:-}"
    volumes:
      - rtbit-db:/home/rtbit/db
      - rtbit-cache:/home/rtbit/cache
      - ${RTBIT_DOWNLOADS:-/mnt/data3/downloads/rtbit}:/home/rtbit/downloads
      - ${RTBIT_COMPLETED:-/mnt/data3/completed/rtbit}:/home/rtbit/completed

volumes:
  indexarr-pgdata:
  indexarr-data:
  rtbit-db:
  rtbit-cache:
